name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- Python 后端打包 ----------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Build backend with PyInstaller
        working-directory: backend
        run: uv run pyinstaller --noconfirm --onedir --console --add-data "app_edgeStress;app_edgeStress/" main.py

      - name: Encrypt backend with py2pyd
        working-directory: backend
        run: uv run py2pyd -r -d --no-confirm dist/main/_internal/app_edgeStress

      - name: Copy backend to frontend resources
        run: |
          mkdir -p frontend/resources/backend
          xcopy /E /I /Y backend\dist\main\* frontend\resources\backend\
        shell: cmd

      # ---------- Electron 前端打包 ----------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Electron app (Windows)
        working-directory: frontend
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: frontend/dist/*.exe

      # ---------- 发布到 GitHub Release ----------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
